<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title> {% block title %} {% endblock title %} | URBAN BREW</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    .icon-spacing {
      margin-left: 10px;
      cursor: pointer;
      /* Add cursor pointer to show it's clickable */
    }

    .app-button-spacing {
      margin-right: 20px;
    }

    .custom-heading {
      font-family: "Raleway", cursive;
      font-variant: small-caps;
      line-height: 1;
      font-weight: bold;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
    }

    .navbar-brand img {
      order: 1;
      /* Move image to the right */
      margin-left: 2px;
      /* Add some space between text and image */
    }

    /* Carousel styles */
    .carousel-item::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.4));
      pointer-events: none;
    }

    .carousel-caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 60px;
      z-index: 10;
      padding: 20px;
      text-align: center;
      width: 80%;
      max-width: 900px;
      margin: 0 auto;
      border-radius: 10px;
      background-color: rgba(255, 255, 255, 0.6);
      color: #333;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }

    .content-text {
      font-size: 20px;
      /* Larger text for content */
    }

    .footer-container {
      background-color: #edece8;
      /* Dark footer background */
      color: #cbc7c7;
      /* Light grey text */
      padding-top: 10px;
    }

    .footer-content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px 15px;
    }

    .footer-link {
      color: #101010 !important;
      font-weight: 500;
      font-size: 16px;
      transition: color 0.3s ease;
    }

    .footer-link:hover {
      color: #ffffff !important;
      text-decoration: none;
    }

    .footer-text {
      text-align: center;
      color: #6d6a6a;
      font-size: 14px;
      margin-top: 10px;
      padding-bottom: 10px;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">
        <div class="d-flex align-items-center">
          <h3 class="custom-heading mb-0">
            <span style="color:rgb(70, 53, 38);">URBAN</span><br>
            <span style="color:rgb(70, 53, 38);">BREW</span>
          </h3>
          <img src="\static\home\coffee.png" width="70" height="70" class="ml-0" style="margin-left: -25px; z-index: 1;"
            id="coffee-icon">
        </div>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/instantcoffee"><b>Instant Coffee</b></a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/gifts"><b>Gifts</b></a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/accessories"><b>Accessories</b></a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/aboutus"><b>About Us</b></a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="/contact "><b>Contact</b></a>
          </li>
        </ul>
        <button type="button" class="btn btn-outline-dark app-button-spacing"
          style="color: green; border-radius: 50px;">Get The App</button>
        <form class="d-flex" role="search">
          <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
          <!-- <button class="btn btn-outline-success" type="submit">Search</button> -->
        </form>
        <ion-icon size="large" name="person-circle-outline" class="icon-spacing"></ion-icon>
        <ion-icon size="large" name="cart-outline" class="icon-spacing"></ion-icon>
      </div>
    </div>
  </nav>

  {% if messages %}
  {% for message in messages %}
  <div class="alert alert-{{ message.tags }} alert-dismissible fade show my-0" role="alert">
    <strong>{{ message }}</strong>
    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  {% endfor %}
  {% endif %}

  {% block body %} {% endblock body %}

  <footer class="container-fluid" style="background-color: #f0efea; padding: 20px 0; margin-top: 0; color: white;">
    <div class="container d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center">
        <span class="bg-light text-dark px-2 py-1 rounded me-2" style="font-weight: bold;">U</span>
        <span class="text-dark">© 2025 <i>urbanbrew.com</i></span>
      </div>
      <div>
        <a href="#" class="text-dark">
          <ion-icon name="logo-instagram" size="large"></ion-icon>
        </a>
        <a href="#" class="text-dark">
          <ion-icon name="logo-facebook" size="large"></ion-icon>
        </a>
        <a href="#" class="text-dark">
          <ion-icon name="logo-twitter" size="large"></ion-icon>
        </a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
