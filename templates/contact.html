{% extends "base.html" %}

{% block title %} Contact {% endblock title %}

{% block body %}
<div class="container-fluid p-0">
  <img src="\static\home\cafee.jpg" class="d-block w-100" height="600" width="1200">
</div>

<div class="container mt-5">
  <div
    style="width: 350px; height: 100px; background: linear-gradient(to right, #e6f7ff, #fff0f5); border-radius: 40px; display: flex; justify-content: center; align-items: center; margin: 0 auto; margin-bottom: 30px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
    <h1 style="font-family: 'Arial', sans-serif; margin: 0; padding: 0; font-size: 28px;">Contact Us</h1>
  </div>

  <h3 class="text-center mb-4" style="color: #555; font-family: 'Arial', sans-serif;"> We love to hear from you! 😍💕
  </h3>

  <form method="post" action="{% url 'cont' %}" class="p-4 bg-light rounded shadow-sm" style="max-width: 800px; margin: 0 auto; border: 1px solid #eee;">
    {% csrf_token %}
    <div class="form-group mb-3">
      <label for="name" style="font-weight: 600; color: #333;">Name</label>
      <input type="text" class="form-control" name="name" placeholder="Enter your Name"
        style="border-radius: 20px; padding: 10px 15px; border: 1px solid #ddd;">
    </div>

    <div class="form-group mb-3">
      <label for="email" style="font-weight: 600; color: #333;">Email address</label>
      <input type="email" class="form-control" name="email" placeholder="Enter Your Email"
        style="border-radius: 20px; padding: 10px 15px; border: 1px solid #ddd;">
    </div>

    <div class="form-group mb-3">
      <label for="phone" style="font-weight: 600; color: #333;">Phone Number</label>
      <input type="tel" class="form-control" name="phone" placeholder="Enter Your Phone No."
        style="border-radius: 20px; padding: 10px 15px; border: 1px solid #ddd;">
    </div>

    <div class="form-group mb-4">
      <label for="desc" style="font-weight: 600; color: #333;">Tell me about what you want to contact me for...</label>
      <textarea class="form-control" id="desc" rows="5" name="desc"
        style="border-radius: 20px; padding: 15px; border: 1px solid #ddd;"></textarea>
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-primary px-5 py-2"
        style="border-radius: 25px; background: linear-gradient(to right, #5e9ee8, #9b6ee8); border: none; font-weight: 600; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">Submit</button>
    </div>
  </form>

  <div class="mt-4 text-center mb-5">
    <p style="color: #666; font-size: 14px;">We'll get back to you within 24 hours</p>
  </div>
</div>
{% endblock body %}
